name: Deploy Web to GitHub Pages

# Требует секрет NEXT_PUBLIC_API_URL (URL API на Render).
# В Settings → Pages включите GitHub Actions.
# Для репозитория user/repo (не user.github.io) задайте переменную
# NEXT_PUBLIC_BASE_PATH = /repo-name

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static web (webpack)
        run: |
          npm run build:static -w web
          cp web/out/index.html web/out/404.html
        shell: bash
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

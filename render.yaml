services:
  - type: web
    name: glassnet-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:push -w api && npm run build -w api
    startCommand: npm run start -w api
    healthCheckPath: /health
    disk:
      name: glassnet-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/glassnet.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MESSAGE_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: glassnet-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: glassnet-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build -w web
    startCommand: npm run start -w web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: glassnet-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

# Опционально: Render. Основной деплой — Vercel (docs/VERCEL.md).
services:
  - type: web
    name: glassnet-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate -w api && npm run build -w api
    startCommand: npm run start -w api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MESSAGE_ENCRYPTION_KEY
        generateValue: true
